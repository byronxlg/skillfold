name: Skillfold Check
description: Verify compiled agent skill output is up-to-date
branding:
  icon: check-circle
  color: blue

inputs:
  config:
    description: Path to skillfold config file
    required: false
  target:
    description: "Output target: skill or claude-code"
    required: false

runs:
  using: composite
  steps:
    - name: Skillfold --check
      shell: bash
      env:
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_TARGET: ${{ inputs.target }}
      run: |
        args=(--check)
        if [ -n "$INPUT_CONFIG" ]; then
          args+=(--config "$INPUT_CONFIG")
        fi
        if [ -n "$INPUT_TARGET" ]; then
          args+=(--target "$INPUT_TARGET")
        fi
        npx skillfold "${args[@]}"
