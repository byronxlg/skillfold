name: Skillfold Check
description: Verify skillfold.yaml, skillfold.lock, and installed skills agree
branding:
  icon: check-circle
  color: blue

inputs:
  dir:
    description: Directory containing skillfold.yaml
    required: false

runs:
  using: composite
  steps:
    - name: skillfold check
      shell: bash
      env:
        INPUT_DIR: ${{ inputs.dir }}
      run: |
        args=(check)
        if [ -n "$INPUT_DIR" ]; then
          args+=(--dir "$INPUT_DIR")
        fi
        npx skillfold "${args[@]}"
