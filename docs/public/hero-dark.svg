<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" fill="none">
  <defs>
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="gd2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="gd3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="glow-d">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr-d" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#34d399" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Background grid dots -->
  <pattern id="dots-d" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.8" fill="#34d399" opacity="0.06"/>
  </pattern>
  <rect width="420" height="320" fill="url(#dots-d)"/>

  <!-- === Left column: Atomic Skills === -->
  <text x="68" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">SKILLS</text>

  <!-- Skill: planning -->
  <rect x="18" y="36" width="100" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="36" cy="52" r="6" fill="#34d399" opacity="0.15"/>
  <text x="35" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#34d399" font-weight="700">P</text>
  <text x="72" y="56" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#d1d5db">planning</text>

  <!-- Skill: code-writing -->
  <rect x="18" y="76" width="100" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="36" cy="92" r="6" fill="#22d3ee" opacity="0.15"/>
  <text x="35" y="95" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#22d3ee" font-weight="700">C</text>
  <text x="76" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#d1d5db">code-writing</text>

  <!-- Skill: code-review -->
  <rect x="18" y="116" width="100" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="36" cy="132" r="6" fill="#22d3ee" opacity="0.15"/>
  <text x="35" y="135" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#22d3ee" font-weight="700">R</text>
  <text x="76" y="136" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#d1d5db">code-review</text>

  <!-- === Center: Composed Agents === -->
  <text x="210" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">AGENTS</text>

  <!-- Composition arrows -->
  <path d="M118,52 C145,52 145,60 170,60" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.35" fill="none"/>
  <path d="M118,92 C145,92 145,76 170,76" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.35" fill="none"/>

  <!-- Agent: engineer -->
  <rect x="170" y="46" width="80" height="42" rx="10" fill="url(#gd)" filter="url(#glow-d)"/>
  <text x="210" y="63" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#0f172a">engineer</text>
  <text x="210" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#0f172a" opacity="0.7">P + C</text>

  <!-- Composition arrows -->
  <path d="M118,52 C148,52 148,115 170,115" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.35" fill="none"/>
  <path d="M118,132 C148,132 148,131 170,131" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.35" fill="none"/>

  <!-- Agent: reviewer -->
  <rect x="170" y="102" width="80" height="42" rx="10" fill="url(#gd)" filter="url(#glow-d)"/>
  <text x="210" y="119" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#0f172a">reviewer</text>
  <text x="210" y="134" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#0f172a" opacity="0.7">P + R</text>

  <!-- === Compiler block === -->
  <text x="210" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">COMPILE</text>

  <!-- Flow arrows -->
  <path d="M210,88 L210,188" stroke="url(#gd2)" stroke-width="1.5" fill="none" marker-end="url(#arr-d)"/>
  <path d="M210,144 L210,188" stroke="url(#gd2)" stroke-width="1.5" fill="none"/>

  <!-- Compiler -->
  <rect x="155" y="190" width="110" height="36" rx="10" fill="url(#gd)" filter="url(#glow-d)"/>
  <text x="210" y="213" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">skillfold</text>

  <!-- === Bottom: Output Targets === -->
  <text x="210" y="252" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">OUTPUT</text>

  <!-- Fan-out arrows -->
  <path d="M175,226 L70,264" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.3" fill="none"/>
  <path d="M195,226 L160,264" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.3" fill="none"/>
  <path d="M210,226 L210,264" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.3" fill="none"/>
  <path d="M225,226 L260,264" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.3" fill="none"/>
  <path d="M245,226 L350,264" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.3" fill="none"/>

  <!-- Target chips -->
  <rect x="20" y="266" width="98" height="28" rx="6" fill="rgba(255,255,255,0.04)" stroke="#34d399" stroke-width="1" stroke-opacity="0.35"/>
  <text x="69" y="284" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#6ee7b7">Claude Code</text>

  <rect x="126" y="266" width="68" height="28" rx="6" fill="rgba(255,255,255,0.04)" stroke="#34d399" stroke-width="1" stroke-opacity="0.35"/>
  <text x="160" y="284" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#6ee7b7">Cursor</text>

  <rect x="202" y="266" width="56" height="28" rx="6" fill="rgba(255,255,255,0.04)" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.35"/>
  <text x="230" y="284" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#67e8f9">Codex</text>

  <rect x="266" y="266" width="66" height="28" rx="6" fill="rgba(255,255,255,0.04)" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.35"/>
  <text x="299" y="284" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#67e8f9">Gemini</text>

  <rect x="340" y="266" width="62" height="28" rx="6" fill="rgba(255,255,255,0.04)" stroke="#4b5563" stroke-width="1" stroke-opacity="0.3"/>
  <text x="371" y="284" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#6b7280">+8 more</text>

  <!-- Decorative: state flow indicator -->
  <rect x="310" y="44" width="92" height="54" rx="8" fill="url(#gd3)" stroke="#34d399" stroke-width="1" stroke-opacity="0.15"/>
  <text x="356" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#9ca3af" letter-spacing="0.05em">STATE</text>
  <text x="356" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">tasks: list</text>
  <text x="356" y="89" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">plan: Plan</text>

  <!-- State connection lines -->
  <path d="M310,71 L254,67" stroke="#34d399" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="3 3" fill="none"/>
  <path d="M310,71 L254,123" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="3 3" fill="none"/>
</svg>
