name: skillfold-team

skills:
  atomic:
    architecture: ./skills/architecture
    create-readme: https://github.com/github/awesome-copilot/tree/main/skills/create-readme
    design: ./skills/design
    task-decomposition: ./skills/task-decomposition
    code-generation: ./skills/code-generation
    code-review: ./skills/code-review
    testing: ./skills/testing
    product-strategy: ./skills/product-strategy
    github: ./skills/github
    skillfold-context: ./skills/skillfold-context

  composed:
    strategist:
      compose: [skillfold-context, product-strategy, design, task-decomposition]
      description: "Assesses what the project needs and sets direction for the next increment."

    architect:
      compose: [skillfold-context, architecture, task-decomposition, github]
      description: "Designs systems and decomposes work into GitHub issues."

    designer:
      compose: [skillfold-context, create-readme, design, github]
      description: "Designs project-facing content like READMEs, docs, and landing pages for visual impact and clarity."

    marketer:
      compose: [skillfold-context, product-strategy, design, github]
      description: "Positions the project for adoption through messaging, content, and outreach."

    engineer:
      compose: [skillfold-context, code-generation, testing, github]
      description: "Writes production-quality TypeScript code and tests, works on feature branches and opens PRs."

    reviewer:
      compose: [skillfold-context, code-review, design, testing, github]
      description: "Reviews pull requests on GitHub for correctness, design quality, and maintainability."

    orchestrator:
      compose: [skillfold-context, github]
      description: "Coordinates the skillfold-team pipeline execution and merges approved PRs."

state:
  Review:
    approved: bool
    feedback: string

  Task:
    title: string
    description: string

  direction:
    type: string
    location:
      skill: github
      path: discussions/general

  plan:
    type: string
    location:
      skill: github
      path: discussions/general
      kind: reply

  tasks:
    type: list<Task>
    location:
      skill: github
      path: issues

  implementation:
    type: string
    location:
      skill: github
      path: pull-requests

  review:
    type: Review
    location:
      skill: github
      path: pull-requests
      kind: review

team:
  orchestrator: orchestrator

  flow:
    - strategist:
        writes: [state.direction]
      then: architect

    - architect:
        reads: [state.direction]
        writes: [state.plan, state.tasks]
      then: engineer

    - engineer:
        reads: [state.plan, state.tasks]
        writes: [state.implementation]
      then: reviewer

    - reviewer:
        reads: [state.implementation]
        writes: [state.review]
      then:
        - when: review.approved == false
          to: engineer
        - when: review.approved == true
          to: end
