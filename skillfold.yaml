name: skillfold-team

skills:
  # Atomic skills
  architecture: ./skills/architecture
  task-decomposition: ./skills/task-decomposition
  code-generation: ./skills/code-generation
  code-review: ./skills/code-review
  testing: ./skills/testing
  product-strategy: ./skills/product-strategy
  skillfold-context: ./skills/skillfold-context
  agent-invocation: ./skills/agent-invocation

  # Composed agents
  strategist:
    compose: [skillfold-context, product-strategy, task-decomposition]

  architect:
    compose: [skillfold-context, architecture, task-decomposition]

  engineer:
    compose: [skillfold-context, code-generation, testing]

  reviewer:
    compose: [skillfold-context, code-review, testing]

  # Orchestrator gets composed context + generated execution plan
  orchestrator:
    compose: [skillfold-context, agent-invocation]

orchestrator: orchestrator

state:
  Review:
    approved: bool
    feedback: string

  direction:
    type: string

  plan:
    type: string

  implementation:
    type: string

  review:
    type: Review

graph:
  - strategist:
      writes: [state.direction]
    then: architect

  - architect:
      reads: [state.direction]
      writes: [state.plan]
    then: engineer

  - engineer:
      reads: [state.plan]
      writes: [state.implementation]
    then: reviewer

  - reviewer:
      reads: [state.implementation]
      writes: [state.review]
    then:
      - when: review.approved == false
        to: engineer
      - when: review.approved == true
        to: end
